<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>For Peno 💖</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ffdde1, #ee9ca7);
    color: #2b2b2b;
    text-align: center;
    overflow-x: hidden;
}

.container {
    padding: 40px 20px;
}

h1 {
    font-size: 2.5em;
    margin-bottom: 10px;
}

.sub {
    font-size: 1.2em;
    opacity: 0.9;
}

.card {
    background: rgba(255,255,255,0.75);
    color: #2b2b2b;
    padding: 20px;
    border-radius: 20px;
    margin-top: 20px;
    backdrop-filter: blur(10px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

.countdown {
    font-size: 2em;
    margin-top: 15px;
    font-weight: bold;
}

.heart {
    font-size: 3em;
    animation: beat 1s infinite;
}

@keyframes beat {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.2); }
}

.message {
    margin-top: 20px;
    font-size: 1.1em;
    line-height: 1.6em;
    white-space: pre-line;
}

button {
    margin-top: 20px;
    padding: 12px 22px;
    border: none;
    border-radius: 20px;
    cursor: pointer;
    font-size: 1em;
    background: #ff5e78;
    color: white;
    font-weight: bold;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

.hidden {
    display: none;
}
</style>
</head>

<body>

<div class="container">

    <div class="heart">💖</div>

    <h1>For Peno</h1>
    <div class="sub">From Bunny 🐰</div>

    <div class="card">
        <p>Today is 4th July</p>
        <p>And I am counting every second until your birthday 💌</p>

        <div class="countdown" id="countdown"></div>
    </div>

    <button onclick="showMessage()">Open My Heart 💌</button>

    <div class="card hidden" id="msgBox">
        <div class="message" id="typed"></div>
    </div>

</div>

<script>
// Countdown
function updateCountdown() {
    const target = new Date("July 11, 2026 00:00:00").getTime();
    const now = new Date().getTime();
    const diff = target - now;

    if (diff <= 0) {
        document.getElementById("countdown").innerHTML = "It's your birthday 💖";
        return;
    }

    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
    const minutes = Math.floor((diff / (1000 * 60)) % 60);
    const seconds = Math.floor((diff / 1000) % 60);

    document.getElementById("countdown").innerHTML =
        `${days}d ${hours}h ${minutes}m ${seconds}s`;
}

setInterval(updateCountdown, 1000);
updateCountdown();

// Romantic message
const text = 
`Hey Peno 💖

It's Bunny here 🐰

I just want you to know something simple but real...

I didn’t just remember your birthday.
I didn’t just mark the date.

I’ve been counting every second until July 11th,
because every second feels closer to you.

You are not just my favorite person —
you are my peace, my smile, my comfort, my home.

Even when we are not talking,
you are still somehow in my thoughts.

And I don’t say it enough,
but I really, truly appreciate you.

You make ordinary days feel special.

So this is just my small way of saying:
I see you, I remember you, I value you.

Happy upcoming birthday, my Peno 💖
I can’t wait to celebrate you.`;

let i = 0;

function typeText() {
    if (i < text.length) {
        document.getElementById("typed").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeText, 25);
    }
}

function showMessage() {
    document.getElementById("msgBox").classList.remove("hidden");
    typeText();
}
</script>

</body>
</html>
